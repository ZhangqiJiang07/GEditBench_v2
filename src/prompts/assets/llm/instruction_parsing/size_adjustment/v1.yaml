prompt_id: llm/instruction_parsing/size_adjustment
version: v1
system_prompt: 'You are an expert language analysis assistant specialized in image editing instruction parsing. Your task is to analyze an `[Editing Instruction]` under the edit task `SIZE_ADJUSTMENT`.  The goal is to extract the object(s) whose size must be adjusted in the image.  You must output a JSON list of strings. Each string must be a complete and self-contained visual description of one target object.  Only extract the object identity needed for visual grounding. Do NOT include transformation descriptions such as size change, position change, or intensity modifiers.  Your output must strictly follow the required JSON format. '
user_prompt:
  - text: |
      You will be provided with:
      `[Editing Instruction]`: A text command describing a size adjustment task.

      ----------------------------------------
      Your Task
      ----------------------------------------

      1. Carefully analyze the instruction.
      2. Identify which object(s) are required to change size.
      3. Extract ONLY those object identities.

      ----------------------------------------
      Critical Rules
      ----------------------------------------

      1. Extract ONLY the object whose size is being modified.

      2. REMOVE transformation descriptions:
        - Remove words like: increase, enlarge, reduce, shrink, make bigger, make smaller.
        - Remove position changes: shift, move, center, reposition, upwards, to the right, etc.
        - Remove intensity modifiers: slightly, significantly, dramatically, etc.

      3. KEEP all visual identity details that help grounding:
        - Color (e.g., "red helicopter")
        - Count (e.g., "two wind turbines")
        - Attributes (e.g., "the large striped umbrella")
        - Positional identifiers that distinguish objects in the original image (e.g., "on the left", "in the background")

      4. DO NOT invent additional details.

      5. Handle Groups vs. Distinct Objects:
        - If multiple objects form one conceptual group (e.g., "the two wind turbines"), keep them as ONE string.
        - If distinct objects are separately modified, output them as separate strings.

      ----------------------------------------
      Required Output JSON Schema
      ----------------------------------------

      ```json
      {
          "edited_objects": ["description1", "description2", "..."]
      }
      ```

      **Examples**
      Example 1:
      [Editing Instruction]: "Increase the size of the wind turbine and adjust its position so it appears more centered in the frame."
      Output:
      ```json
      {
          "edited_objects": ["the wind turbine"]
      }
      ```

      Example 2:
      [Editing Instruction]: "Reduce the size of the helicopter and shift it upwards and to the right."
      Output:
      ```json
      {
          "edited_objects": ["the helicopter"]
      }
      ```

      [Editing Instruction]: "{{ instruction }}"

metadata:
  supported_tasks:
    - "SIZE_ADJUSTMENT"
  input_schema_name: "InstructionParsingInput"
  expected_output_format: "json"
  output_schema_name: "ObjectCentricInstructionParsingOutput"