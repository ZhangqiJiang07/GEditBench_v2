

client_config:
  ip_address: "${env:GEDITV2_VLLM_HOST:127.0.0.1}"
  vlm_port: "${env:GEDITV2_VLM_PORT:25930}"
  llm_port: "${env:GEDITV2_LLM_PORT:25111}"
  api_key: "${env:OPENAI_API_KEY:YOUR_OPENAI_API_KEY}"
  base_url: "${env:OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}"
  max_tokens: "${env:GEDITV2_MAX_TOKENS:2048}"
  retries: "${env:GEDITV2_CLIENT_RETRIES:3}"
  timeout: "${env:GEDITV2_CLIENT_TIMEOUT:600}"

model_paths:
  dino_v3_path: "${env:DINO_V3_PATH:/path/to/models/facebook/dinov3-vitb16-pretrain-lvd1689m}"
  clip_path: "${env:CLIP_PATH:/path/to/models/openai/clip-vit-base-patch32}"
  sam_path: "${env:SAM_PATH:/path/to/models/facebook/sam2.1-hiera-large/sam2.1_hiera_large.pt}"
  sam_cfg: "configs/sam2.1/sam2.1_hiera_l.yaml"
  arcface_root: "${env:ARCFACE_ROOT:/path/to/models/.insightface}"
  hair_segmentation_path: "${env:HAIR_SEGMENTATION_PATH:/path/to/models/google_mediapipe_models/hair_segmenter.tflite}"
  depth_anything_v2_path: "${env:DEPTH_ANYTHING_V2_PATH:/path/to/models/depth-anything/Depth-Anything-V2-Large-hf}"
